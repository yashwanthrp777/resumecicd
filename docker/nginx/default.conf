# =============================================================
# Nginx Reverse Proxy Configuration
# =============================================================
# Handles: SSL termination, gzip compression, security headers,
# rate limiting, and proxying to the Node.js application.
# Domain: airesumeanalyser.duckdns.org
# =============================================================

# ---- Gzip Compression ----
# WHY: Reduces response sizes by 60-80%, dramatically improving
# page load times. Essential for production performance.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;

# ---- Rate Limiting ----
# WHY: Prevents abuse and DDoS attacks by limiting requests
# per IP address. 10 requests/second with burst allowance.
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

# ---- Upstream Definition ----
upstream app_server {
    server web:3000;
}

# ---- HTTP Server (Port 80) ----
# Redirects all traffic to HTTPS.
# Serves Let's Encrypt ACME challenge responses for Certbot.
server {
    listen 80;
    listen [::]:80;
    server_name airesumeanalyser.duckdns.org;

    # Certbot ACME challenge (needed for SSL certificate issuance & renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS Server (Port 443) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name airesumeanalyser.duckdns.org;

    # ---- SSL Certificate Paths (generated by Certbot / Let's Encrypt) ----
    ssl_certificate /etc/letsencrypt/live/airesumeanalyser.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airesumeanalyser.duckdns.org/privkey.pem;

    # ---- SSL Security Settings (Mozilla Intermediate) ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.puter.com https://*.puter.com; connect-src 'self' https://*.puter.com wss://*.puter.com https://*.amazonaws.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.puter.com https://*.amazonaws.com; frame-src 'self' https://*.puter.com; worker-src 'self' blob:; media-src 'self' blob: https://*.puter.com;" always;

    # ---- Client Upload Size Limit ----
    client_max_body_size 10M;

    # ---- Static Assets (long cache) ----
    location /assets {
        proxy_pass http://app_server;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- Application Routes ----
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://app_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ---- Upload Route (stricter rate limit) ----
    location /upload {
        limit_req zone=upload burst=3 nodelay;
        proxy_pass http://app_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
}
