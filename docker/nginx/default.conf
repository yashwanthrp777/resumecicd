# =============================================================
# Nginx Reverse Proxy Configuration
# =============================================================
# Handles: SSL termination, gzip compression, security headers,
# rate limiting, and proxying to the Node.js application.
# =============================================================

# ---- Gzip Compression ----
# WHY: Reduces response sizes by 60-80%, dramatically improving
# page load times. Essential for production performance.
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1000;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;

# ---- Rate Limiting ----
# WHY: Prevents abuse and DDoS attacks by limiting requests
# per IP address. 10 requests/second with burst allowance.
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

# ---- Upstream Definition ----
upstream app_server {
    server web:3000;
}

# ---- HTTP Server (Port 80) ----
# Redirects all traffic to HTTPS in production.
# Also serves Let's Encrypt challenge responses for Certbot.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot ACME challenge (needed for SSL certificate renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # For local development without SSL, proxy directly
    # Comment this block and uncomment the redirect below for production
    location / {
        proxy_pass http://app_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # PRODUCTION: Uncomment to force HTTPS redirect
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

