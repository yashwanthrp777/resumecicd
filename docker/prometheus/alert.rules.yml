# =============================================================
# Prometheus Alerting Rules
# =============================================================
# These rules trigger alerts when critical conditions are met.
# Integrate with Alertmanager for email/Slack notifications.
# =============================================================

groups:
  - name: infrastructure_alerts
    rules:
      # ---- Service Down ----
      # Fires when any monitored target is unreachable
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Service {{ $labels.job }} is DOWN"
          description: "{{ $labels.instance }} has been unreachable for over 1 minute."

      # ---- High CPU Usage ----
      # Fires when CPU usage exceeds 85% for 5 minutes
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "🟡 High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.1f\" $value }}% (threshold: 85%)."

      # ---- High Memory Usage ----
      # Fires when RAM usage exceeds 90%
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "🟡 High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.1f\" $value }}% (threshold: 90%)."

      # ---- Low Disk Space ----
      # Fires when free disk space drops below 10%
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Low disk space on {{ $labels.instance }}"
          description: "Only {{ printf \"%.1f\" $value }}% disk space remaining."

      # ---- High Disk I/O ----
      # Fires when disk I/O utilization exceeds 90%
      - alert: HighDiskIO
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "🟡 High disk I/O on {{ $labels.instance }}"
          description: "Disk I/O utilization is very high."

      # ---- Network Receive Errors ----
      - alert: NetworkReceiveErrors
        expr: rate(node_network_receive_errs_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "🟡 Network receive errors on {{ $labels.instance }}"
          description: "Network interface is experiencing receive errors."
