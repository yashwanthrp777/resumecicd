# =============================================================
# Prometheus Configuration
# =============================================================
# Scrapes metrics from:
#   - Prometheus itself (self-monitoring)
#   - Node Exporter (CPU, RAM, disk, network)
#   - Web application (if /metrics endpoint exists)
# =============================================================

global:
  # How frequently to scrape targets
  scrape_interval: 15s
  # How frequently to evaluate alerting rules
  evaluation_interval: 15s
  # Attach these labels to all metrics and alerts
  external_labels:
    project: 'ai-resume-analyzer'
    environment: 'production'

# Load alerting rules from file
rule_files:
  - "alert.rules.yml"

# ---- Scrape Targets ----
scrape_configs:
  # Prometheus monitoring itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Node Exporter — Host system metrics (CPU, RAM, Disk, Network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'

  # Web Application metrics
  # NOTE: This will return errors until you add a /metrics endpoint.
  # You can add one later using the 'prom-client' npm package.
  # Uncomment when ready:
  # - job_name: 'resume-analyzer-app'
  #   metrics_path: '/metrics'
  #   scrape_interval: 10s
  #   static_configs:
  #     - targets: ['web:3000']
  #       labels:
  #         service: 'web-app'
