# =============================================================
# Grafana Dashboard Auto-Provisioning
# =============================================================
# Automatically loads dashboard JSON files from the specified
# directory when Grafana starts. No manual import needed.
# =============================================================

apiVersion: 1

providers:
  - name: 'AI Resume Analyzer Dashboards'
    orgId: 1
    folder: 'Infrastructure'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
