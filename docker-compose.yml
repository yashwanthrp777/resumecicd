# =============================================================
# AI Resume Analyzer — Docker Compose Production Stack
# =============================================================
# Services:
#   web            → React Router SSR Application (port 3000)
#   nginx          → Reverse Proxy + SSL Termination (ports 80/443)
#   prometheus     → Metrics Collection (port 9090 internal)
#   node-exporter  → Host System Metrics (port 9100 internal)
#   grafana        → Monitoring Dashboard (port 3001 external)
# =============================================================
# Usage:
#   docker compose up -d --build       # Start all services
#   docker compose down                # Stop all services
#   docker compose logs -f web         # Tail app logs
#   docker compose ps                  # Check service status
# =============================================================

networks:
  app-network:
    driver: bridge
    name: resume-app-network
  monitoring-network:
    driver: bridge
    name: resume-monitoring-network

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

services:
  # -----------------------------------------------
  # 1. Web Application (React Router SSR + Node.js)
  # -----------------------------------------------
  # WHY: This is the main application container.
  # Puter.js handles auth/data/AI on the client side,
  # so no separate backend or database container needed.
  # -----------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-analyzer-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # -----------------------------------------------
  # 2. Nginx Reverse Proxy & SSL Gateway
  # -----------------------------------------------
  # WHY: Never expose Node.js directly to the internet.
  # Nginx handles SSL termination, compression, rate
  # limiting, security headers, and static asset caching.
  # -----------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: resume-analyzer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # Periodically reload nginx config so renewed SSL certs are picked up
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost/ || curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------------------------------------
  # 2b. Certbot (Automatic SSL Certificate Renewal)
  # -----------------------------------------------
  # WHY: Automatically renews Let's Encrypt SSL certs
  # every 12 hours. Shares volumes with nginx so the
  # renewed certificates are immediately available.
  # -----------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: resume-analyzer-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Check for renewal every 12 hours (only renews if cert expires within 30 days)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - app-network

  # -----------------------------------------------
  # 3. Prometheus (Metrics Collection Engine)
  # -----------------------------------------------
  # WHY: Collects time-series metrics from Node Exporter
  # and the app itself. Powers Grafana dashboards and
  # alerting rules for CPU, RAM, disk, and uptime.
  # -----------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: resume-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    expose:
      - "9090"
    networks:
      - monitoring-network
      - app-network
    depends_on:
      - node-exporter

  # -----------------------------------------------
  # 4. Node Exporter (Host System Metrics)
  # -----------------------------------------------
  # WHY: Exposes hardware and OS-level metrics like
  # CPU usage, memory consumption, disk I/O, and
  # network traffic for Prometheus to scrape.
  # -----------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: resume-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"
    networks:
      - monitoring-network

  # -----------------------------------------------
  # 5. Grafana (Visualization & Dashboards)
  # -----------------------------------------------
  # WHY: Provides beautiful real-time dashboards for
  # all Prometheus metrics. Auto-provisioned with a
  # pre-built system monitoring dashboard.
  # Access at http://your-server:3001
  # -----------------------------------------------
  grafana:
    image: grafana/grafana:11.0.0
    container_name: resume-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    networks:
      - monitoring-network
      - app-network
    depends_on:
      - prometheus
