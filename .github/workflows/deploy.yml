# =============================================================
# AI Resume Analyzer — GitHub Actions CI/CD Pipeline
# =============================================================
# Triggers on push/PR to main branch
# Pipeline: Typecheck → Build Docker Image → Push to Docker Hub → Deploy to EC2
# =============================================================

name: CI/CD Pipeline — Build, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ai-resume-analyzer

jobs:
  # =========================================
  # Job 1: Quality Gate (Typecheck & Validate)
  # =========================================
  quality-check:
    name: 🔍 Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type checking
        run: npm run typecheck

      - name: Build application
        run: npm run build

  # =========================================
  # Job 2: Build & Push Docker Image
  # =========================================
  docker-build-push:
    name: 🐳 Build & Push Docker Image
    needs: quality-check
    runs-on: ubuntu-latest
    # Only run on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # =========================================
  # Job 3: Deploy to AWS EC2 via SSH
  # =========================================
  deploy:
    name: 🚀 Deploy to Production
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            echo "========================================="
            echo "🚀 Starting deployment at $(date)"
            echo "========================================="

            # Navigate to project directory or clone it if it doesn't exist
            if [ ! -d "$HOME/ai-resume-analyzer" ]; then
              echo "📁 Directory $HOME/ai-resume-analyzer not found. Cloning repository..."
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git $HOME/ai-resume-analyzer
            fi

            cd $HOME/ai-resume-analyzer || exit 1

            # Pull latest source code (for docker-compose.yml, nginx config, etc.)
            git pull origin main

            # Login to Docker Hub and pull the latest image
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ai-resume-analyzer:latest

            # ---- Zero-Downtime Deployment ----
            # Recreate only the web container with the new image
            # Other services (nginx, prometheus, grafana, certbot) stay running
            docker compose up -d --no-deps --force-recreate web

            # Wait for health check to pass
            echo "⏳ Waiting for health check..."
            sleep 10

            # Reload nginx so it picks up the new web container's address
            echo "🔄 Reloading nginx..."
            docker compose exec nginx nginx -s reload || true

            # Verify the app is healthy
            if docker compose ps web | grep -q "healthy"; then
              echo "✅ Deployment successful! App is healthy."
            else
              echo "⚠️ Warning: Health check not yet passed. Check logs with: docker compose logs web"
            fi

            # Clean up old images to save disk space
            docker image prune -f

            echo "========================================="
            echo "✅ Deployment completed at $(date)"
            echo "========================================="

  # =========================================
  # Job 4: Rollback (Manual Trigger)
  # =========================================
  # To rollback, create a workflow_dispatch trigger or
  # run on the EC2 server:
  #   docker compose up -d --no-deps web  # with previous image tag
  # =========================================
